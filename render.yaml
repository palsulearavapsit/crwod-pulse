services:
  - type: web
    name: crowdpulse-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false   # https://crowdpulse.vercel.app
      - key: GEMINI_API_KEY
        sync: false   # Set your Gemini API key in the Render dashboard
