services:
  - type: web
    name: crowdpulse-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://frontend-five-psi-44.vercel.app
    # Add other backend environment variables below by logging into the Render dashboard
